name: check

on:
  schedule:
    # Runs at 02:30, only on Friday.
    - cron: "30 2 * * 5"
  workflow_dispatch:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Moon (nightly)
        uses: illusory0x0/setup-moonbit@v0.1.0
        with:
          version: pre-release

      - name: moon version
        run: moon version --all

      - name: install module dependencies
        run: moon update

      - name: moon check
        run: moon check --deny-warn --target native

      - name: moon build
        run: moon build --target native

      - name: moon info
        run: |
          moon info --target native
          git diff --exit-code

      - name: format diff
        run: |
          moon fmt
          git diff --exit-code

      - name: Set ulimit
        run: ulimit -s 8176

      - name: moon test
        run: |
          moon test --target native
          moon test --target native
